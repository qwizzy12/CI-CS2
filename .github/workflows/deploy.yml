name: Deploy CS2 Configs

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Sync files to Server
        uses: Burnett01/rsync-deployments@v7.0.1
        with:
          switches: "-avzr --delete"
          path: "plugins_and_configs/"
          remote_path: "/home/meowzonn/cs2_updates/"
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_KEY }}
          remote_port: 22

      - name: Move files and Restart CS2 Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: 22
          script: |
            sudo cp -rf /home/meowzonn/cs2_updates/* /home/steam/cs2_server/game/csgo/addons/counterstrikesharp/ || true
            sudo systemctl restart cs2.service
